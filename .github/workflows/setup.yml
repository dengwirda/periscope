name: periscope test

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v3

      - name: Print environment
        run: |
          echo github.event.action: ${{ github.event.action }}
          echo github.event_name: ${{ github.event_name }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies on unx
        if: startsWith(matrix.config.name, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get gcc g++ gfortran
          sudo apt-get install ninja-build
          ninja --version
          g++ --version
          gfortran --version
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools --upgrade
          pip install -r requirements.txt

      - name: Build periscope back-end
        run: python setup.py build_ext --inplace

      - name: Build periscope external
        run: |
          cd ${{github.workspace}}/ext
          python -m numpy.f2py -c -m akima_ *.f
          cd ${{github.workspace}}

      - name: Download test assets
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: dengwirda/periscope-dev
          file: mesh_w_elev_cvt_8.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download test assets
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: dengwirda/periscope-dev
          file: mesh_w_elev_cvt_7.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Download test assets
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: dengwirda/periscope-dev
          file: mesh_disk_3.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download test assets
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: dengwirda/periscope-dev
          file: fujii.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Unpack test case assets
        run: unzip "*.zip"

      - name: Run periscope testcase 1
        run: |
          export BINDIR=${{github.workspace}}
          export MSHDIR=${{github.workspace}}
          export NUMCPU=$(nproc); echo ${NUMCPU}
          ${{github.workspace}}/run/wtc/ics_tc2_60km.sh
          ${{github.workspace}}/run/wtc/run_tc2_60km_fast.sh
          python chk.py --soln-file="out_tc2_cvt_7.nc"
          
      - name: Run periscope testcase 2
        run: |
          export BINDIR=${{github.workspace}}
          export MSHDIR=${{github.workspace}}
          export NUMCPU=$(nproc); echo ${NUMCPU}
          ${{github.workspace}}/run/wtc/ics_tc5_60km.sh
          ${{github.workspace}}/run/wtc/run_tc5_60km_fast.sh
          python chk.py --soln-file="out_tc5_cvt_7.nc"
          
      - name: Run periscope testcase 3
        run: |
          export BINDIR=${{github.workspace}}
          export MSHDIR=${{github.workspace}}
          export NUMCPU=$(nproc); echo ${NUMCPU}
          ${{github.workspace}}/run/wtc/ics_tc6_60km.sh
          ${{github.workspace}}/run/wtc/run_tc6_60km_fast.sh
          python chk.py --soln-file="out_tc6_cvt_7.nc"
          
      - name: Run periscope testcase 4
        run: |
          export BINDIR=${{github.workspace}}
          export MSHDIR=${{github.workspace}}
          export NUMCPU=$(nproc); echo ${NUMCPU}
          ${{github.workspace}}/run/wav/ics_lgw_60km.sh
          ${{github.workspace}}/run/wav/run_lgw_60km_fast.sh
          python chk.py --soln-file="out_lgw_cvt_7.nc"

      - name: Run periscope testcase 5
        run: |
          export BINDIR=${{github.workspace}}
          export MSHDIR=${{github.workspace}}
          export NUMCPU=$(nproc); echo ${NUMCPU}
          ${{github.workspace}}/run/wav/ics_tsu_30km.sh
          ${{github.workspace}}/run/wav/run_tsu_30km_fast.sh
          python chk.py --soln-file="out_tsu_cvt_8.nc"

      - name: Run periscope testcase 6
        run: |
          export BINDIR=${{github.workspace}}
          export MSHDIR=${{github.workspace}}
          export NUMCPU=$(nproc); echo ${NUMCPU}
          ${{github.workspace}}/run/obc/ics_wake.sh
          ${{github.workspace}}/run/obc/run_wake_fast.sh
          python chk.py --soln-file="out_wake_3.nc"

      - name: Run periscope testcase 7
        run: |
          export BINDIR=${{github.workspace}}
          export MSHDIR=${{github.workspace}}
          export NUMCPU=$(nproc); echo ${NUMCPU}
          ${{github.workspace}}/run/obc/ics_hill.sh
          ${{github.workspace}}/run/obc/run_hill_fast.sh
          python chk.py --soln-file="out_hill_3.nc"
