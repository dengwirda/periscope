name: periscope test

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v3

      - name: Print environment
        run: |
          echo github.event.action: ${{ github.event.action }}
          echo github.event_name: ${{ github.event_name }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies on unx
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          g++ --version
          
      - name: Install dependencies on osx
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install llvm libomp
          clang++ --version
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build periscope back-end
        run: python setup.py build_ext --inplace

      - name: Download test assets
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: dengwirda/periscope
          file: mesh_w_elev_cvt_7.zip
          token: ${{ secrets.GITHUB_TOKEN }}
        run: unzip mesh_w_elev_cvt_7.zip

      - name: Run periscope testcase 1
        run: |
          python ICs/wtc.py \
          --mesh-file="mesh_w_elev_cvt_7.nc" \
          --init-file="wtc2_cvt_7.nc" \
          --radius=6371220. \
          --test-case=2
          python swe.py \
          --mesh-file="wtc2_cvt_7.nc" \
          --numthread=2 \
          --num-steps=576 --time-step=300 \
          --save-freq=288 --stat-freq=144 \
          --integrate="RK32-FB"
